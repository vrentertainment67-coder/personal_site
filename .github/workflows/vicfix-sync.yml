name: Vic Fix Auto Sync

on:
  schedule:
    # Runs every Monday at 9:00 AM IST (3:30 AM UTC)
    - cron: '30 3 * * 1'
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  sync-episodes:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Vic Fix sync script
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: node scripts/vicfix-sync.js

      - name: Check for new episode files
        id: check_changes
        run: |
          git diff --quiet src/content/vicfix/ || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Commit and push new episodes
        if: steps.check_changes.outputs.changes == 'true'
        run: |
          git config --local user.email "vicfix-bot@djvicofficial.com"
          git config --local user.name "Vic Fix Auto Sync"
          git add src/content/vicfix/
          git commit -m "auto: new Vic Fix episode added by sync bot"
          git push
